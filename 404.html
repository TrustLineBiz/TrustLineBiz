<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | TrustLine</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#081426" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy-dark:  #081426;
      --gold:       #c9a84c;
      --gold-light: #e0be72;
      --gold-dark:  #a8863a;
      --white:      #ffffff;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: var(--navy-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 5%;
      text-align: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      margin-bottom: 52px;
    }
    .logo-mark {
      width: 36px; height: 36px;
      background: var(--gold);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 18px;
      color: var(--navy-dark); letter-spacing: -1px;
    }
    .logo-text { font-size: 1.35rem; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
    .logo-text span { color: var(--gold); }
    .err-code {
      font-size: clamp(6rem, 18vw, 10rem);
      font-weight: 900;
      color: var(--gold);
      line-height: 1;
      letter-spacing: -4px;
      margin-bottom: 20px;
      opacity: 0.8;
    }
    h1 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      color: var(--white);
      margin-bottom: 14px;
    }
    p {
      font-size: 1rem;
      color: rgba(255,255,255,0.45);
      max-width: 380px;
      margin: 0 auto 36px;
      line-height: 1.7;
    }
    .btn-home {
      display: inline-block;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: var(--navy-dark);
      font-size: 0.95rem;
      font-weight: 800;
      padding: 15px 36px;
      border-radius: 10px;
      text-decoration: none;
      letter-spacing: 0.2px;
      transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
      box-shadow: 0 6px 20px rgba(201,168,76,0.4);
    }
    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(201,168,76,0.5);
      filter: brightness(1.05);
    }
    .footer-note {
      margin-top: 52px;
      color: rgba(255,255,255,0.18);
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

  <a href="/" class="logo">
    <div class="logo-mark">TL</div>
    <span class="logo-text">Trust<span>Line</span></span>
  </a>

  <div class="err-code">404</div>
  <h1>Page Not Found</h1>
  <p>This page doesn't exist or may have been moved. Let's get you back on track.</p>
  <a href="/" class="btn-home">Back to TrustLine →</a>

  <p class="footer-note">© 2026 TrustLine Biz · trustlinebiz.com</p>

</body>
</html>
