<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<meta name="referrer" content="no-referrer" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<title>TrustLine Lead Finder — Internal</title>
<style>
:root {
  --navy:    #0d1f3c;
  --navy-l:  #162d55;
  --navy-d:  #081426;
  --gold:    #c9a84c;
  --gold-l:  #e0be72;
  --gold-d:  #a8863a;
  --bg:      #080f1e;
  --card:    #0d1f3c;
  --card2:   #102444;
  --border:  rgba(201,168,76,0.18);
  --text:    #e2e8f0;
  --muted:   #64748b;
  --red:     #ef4444;
  --green:   #22c55e;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* ── NAV ── */
.topnav{background:var(--navy-d);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:2px;height:56px;position:sticky;top:0;z-index:50;flex-wrap:nowrap;overflow-x:auto}
.logo{font-size:1rem;font-weight:800;color:var(--text);margin-right:20px;white-space:nowrap;flex-shrink:0}
.logo span{color:var(--gold)}
.logo small{color:var(--muted);font-weight:400;font-size:0.75rem}
.nav-btn{background:none;border:none;color:var(--muted);padding:8px 12px;border-radius:6px;cursor:pointer;font-size:0.78rem;font-weight:600;transition:all .15s;white-space:nowrap;font-family:inherit}
.nav-btn:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.nav-btn.active{color:var(--gold);background:rgba(201,168,76,0.1)}

/* ── SECTIONS ── */
.section{display:none;padding:20px;max-width:1440px;margin:0 auto}
.section.active{display:block}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.section-hdr h1{font-size:1.15rem;font-weight:800}
.section-hdr h1 span{color:var(--gold)}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.card-title{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--gold);margin-bottom:12px}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

/* ── FORM ── */
.fr{margin-bottom:13px}
.fr label{display:block;font-size:0.68rem;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.fr input,.fr select,.fr textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:var(--text);padding:8px 11px;font-size:0.85rem;outline:none;transition:border-color .2s;font-family:inherit}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--gold)}
.fr textarea{resize:vertical;min-height:68px}
.fr select option{background:var(--navy-d);color:var(--text)}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:0.8rem;font-weight:700;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-gold{background:linear-gradient(135deg,var(--gold-d),var(--gold));color:var(--navy-d)}
.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,.22)}
.btn-sm{padding:5px 11px;font-size:0.72rem}
.btn-xs{padding:3px 8px;font-size:0.68rem}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--muted);padding:3px 5px;border-radius:4px;transition:color .15s;font-size:1rem;line-height:1}
.btn-icon:hover{color:var(--gold)}

/* ── BADGES ── */
.score{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.68rem;font-weight:700}
.score-A1{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.score-A2{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid var(--border)}
.score-B1{background:rgba(99,102,241,.15);color:#818cf8;border:1px solid rgba(99,102,241,.3)}
.score-B2{background:rgba(100,116,139,.12);color:var(--muted);border:1px solid rgba(255,255,255,.08)}

.status-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.67rem;font-weight:600}
.s-new-lead{background:rgba(99,102,241,.15);color:#818cf8}
.s-contacted{background:rgba(245,158,11,.15);color:#fbbf24}
.s-responded{background:rgba(16,185,129,.15);color:#34d399}
.s-call-booked{background:rgba(59,130,246,.15);color:#60a5fa}
.s-submitted{background:rgba(168,85,247,.15);color:#c084fc}
.s-closed{background:rgba(34,197,94,.15);color:#22c55e}
.s-dead{background:rgba(239,68,68,.1);color:#f87171}

/* ── DASHBOARD STAT CARDS ── */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.stat-card .num{font-size:2rem;font-weight:800;color:var(--gold);line-height:1}
.stat-card .lbl{font-size:0.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:5px}
.stat-card.danger .num{color:var(--red)}

/* ── PIPELINE ── */
.pipeline-wrap{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;min-height:400px}
.pipe-col{flex:0 0 195px;background:var(--card);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;max-height:calc(100vh - 140px)}
.pipe-col-hdr{padding:11px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pipe-col-hdr .cn{font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.pipe-col-hdr .cc{background:rgba(255,255,255,.07);color:var(--muted);font-size:0.65rem;font-weight:700;padding:2px 7px;border-radius:10px}
.pipe-col-body{padding:8px;flex:1;overflow-y:auto;min-height:80px}
.pipe-col-body.drag-over{background:rgba(201,168,76,.06);border-radius:6px}

/* ── LEAD CARDS ── */
.lead-card{background:var(--card2);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:11px;margin-bottom:7px;cursor:pointer;transition:border-color .15s,transform .1s;user-select:none}
.lead-card:hover{border-color:rgba(201,168,76,.4);transform:translateY(-1px)}
.lead-card.dragging{opacity:.4}
.lead-card.overdue{border-left:3px solid var(--red)}
.lc-name{font-size:0.8rem;font-weight:700;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lc-biz{font-size:0.68rem;color:var(--muted);margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lc-meta{display:flex;align-items:center;justify-content:space-between}
.lc-date{font-size:0.62rem;color:var(--muted)}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;width:100%;max-width:720px;margin:auto}
.modal-hdr{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.modal-hdr h2{font-size:0.95rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal-tabs{display:flex;gap:0;padding:0 22px;border-bottom:1px solid var(--border)}
.mtab{background:none;border:none;color:var(--muted);padding:9px 15px;cursor:pointer;font-size:0.77rem;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;transition:color .15s}
.mtab.active{color:var(--gold);border-bottom-color:var(--gold)}
.mtab-panel{display:none;padding:20px 22px}
.mtab-panel.active{display:block}

/* ── OUTREACH ── */
.oe{background:var(--navy);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:11px 13px;margin-bottom:8px}
.oe-hdr{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.oe-ch{background:rgba(201,168,76,.12);color:var(--gold);padding:2px 7px;border-radius:4px;font-size:0.65rem;font-weight:700}
.oe-dt{font-size:0.65rem;color:var(--muted)}
.oe-msg{font-size:0.77rem;margin-bottom:3px;line-height:1.5}
.oe-resp{font-size:0.73rem;color:#34d399;font-style:italic}

/* ── SEARCH ── */
.quick-btns{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
.qbtn{background:rgba(201,168,76,.07);border:1px solid var(--border);color:var(--gold-l);padding:5px 13px;border-radius:20px;cursor:pointer;font-size:0.75rem;font-weight:600;transition:all .15s;font-family:inherit}
.qbtn:hover{background:rgba(201,168,76,.16);border-color:var(--gold)}
.search-links{display:flex;gap:9px;flex-wrap:wrap;margin-top:13px}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:0.78rem}
.tbl th{text-align:left;padding:7px 11px;color:var(--muted);font-size:0.63rem;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);font-weight:600}
.tbl td{padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,.02);cursor:pointer}

/* ── MISC ── */
.overdue-banner{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:11px 15px;margin-bottom:16px;font-size:0.8rem;color:#fca5a5;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.detail-row{margin-bottom:14px}
.detail-row .dl{font-size:0.63rem;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:2px}
.detail-row .dv{font-size:0.83rem}
.pill{display:inline-block;padding:2px 9px;border-radius:4px;font-size:0.68rem;font-weight:600}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.09);border-radius:3px}

#toast{display:none;position:fixed;bottom:22px;right:22px;background:var(--navy-d);border:1px solid var(--gold);color:var(--text);padding:11px 18px;border-radius:8px;font-size:0.8rem;font-weight:600;z-index:400;box-shadow:0 8px 32px rgba(0,0,0,.45)}

@media(max-width:900px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.g4{grid-template-columns:1fr 1fr}.g3,.g2{grid-template-columns:1fr}.section{padding:12px}}
</style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <div class="logo">Trust<span>Line</span> <small>Lead Finder</small></div>
  <button class="nav-btn active"  onclick="show('dashboard')">Dashboard</button>
  <button class="nav-btn"         onclick="show('search')">Search</button>
  <button class="nav-btn"         onclick="show('add-lead')">+ Add Lead</button>
  <button class="nav-btn"         onclick="show('pipeline')">Pipeline</button>
  <button class="nav-btn"         onclick="show('all-leads')">All Leads</button>
</nav>

<!-- ── DASHBOARD ─────────────────────────────────────── -->
<section id="dashboard" class="section active">
  <div class="section-hdr">
    <h1>Dashboard <span>Overview</span></h1>
    <span id="dash-date" style="font-size:0.75rem;color:var(--muted)"></span>
  </div>
  <div id="overdue-banner"></div>
  <div class="g4" style="margin-bottom:16px" id="dash-stats"></div>
  <div class="g2" style="gap:14px">
    <div class="card">
      <div class="card-title">Pipeline Breakdown</div>
      <div id="dash-pipeline"></div>
    </div>
    <div class="card">
      <div class="card-title">Active A1 Hot Leads</div>
      <div id="dash-hot"></div>
    </div>
  </div>
</section>

<!-- ── SEARCH ─────────────────────────────────────────── -->
<section id="search" class="section">
  <div class="section-hdr"><h1>Lead <span>Search</span></h1></div>
  <div class="card" style="margin-bottom:14px">
    <div class="card-title">Quick Search by Niche</div>
    <div class="quick-btns">
      <button class="qbtn" onclick="quickSearch('Restaurant')">🍽 Restaurants</button>
      <button class="qbtn" onclick="quickSearch('General Contractor')">🔨 Contractors</button>
      <button class="qbtn" onclick="quickSearch('Retail Store')">🛍 Retail</button>
      <button class="qbtn" onclick="quickSearch('Auto Repair Shop')">🚗 Auto Repair</button>
      <button class="qbtn" onclick="quickSearch('Medical Office')">🏥 Medical</button>
      <button class="qbtn" onclick="quickSearch('Gym Fitness Studio')">💪 Fitness</button>
      <button class="qbtn" onclick="quickSearch('Trucking Company')">🚛 Trucking</button>
      <button class="qbtn" onclick="quickSearch('Landscaping Company')">🌿 Landscaping</button>
      <button class="qbtn" onclick="quickSearch('Salon Spa')">💅 Salon / Spa</button>
      <button class="qbtn" onclick="quickSearch('Plumber')">🔧 Plumbing</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Custom Search</div>
    <div class="g3" style="margin-bottom:13px">
      <div class="fr" style="margin-bottom:0"><label>Business Type</label><input id="s-type" placeholder="e.g. Restaurant, Contractor" /></div>
      <div class="fr" style="margin-bottom:0"><label>City / State</label><input id="s-loc"  placeholder="e.g. Miami, FL" /></div>
      <div class="fr" style="margin-bottom:0"><label>Keywords</label><input id="s-kw" placeholder="e.g. family owned, fast food" /></div>
    </div>
    <div class="search-links">
      <button class="btn btn-gold"    onclick="doSearch('maps')">🗺 Google Maps</button>
      <button class="btn btn-outline" onclick="doSearch('yelp')">⭐ Yelp</button>
      <button class="btn btn-outline" onclick="doSearch('fb')">📘 Facebook Pages</button>
      <button class="btn btn-outline" onclick="doSearch('ig')">📷 Instagram</button>
      <button class="btn btn-outline" onclick="doSearch('li')">💼 LinkedIn</button>
    </div>
  </div>
</section>

<!-- ── ADD LEAD ────────────────────────────────────────── -->
<section id="add-lead" class="section">
  <div class="section-hdr"><h1>Add <span>New Lead</span></h1></div>
  <div class="card" style="max-width:740px">
    <form id="lead-form" onsubmit="submitLead(event)">
      <div class="g2">
        <div class="fr"><label>Business Name *</label><input id="f-biz"   required placeholder="Acme Restaurant" /></div>
        <div class="fr"><label>Owner Name</label>   <input id="f-owner"          placeholder="John Smith" /></div>
      </div>
      <div class="g2">
        <div class="fr"><label>Phone</label>  <input id="f-phone" type="tel"   placeholder="(555) 000-0000" /></div>
        <div class="fr"><label>Email</label>  <input id="f-email" type="email" placeholder="owner@business.com" /></div>
      </div>
      <div class="g2">
        <div class="fr"><label>Website</label>        <input id="f-web"  placeholder="www.business.com" /></div>
        <div class="fr"><label>Business Type</label>  <input id="f-type" placeholder="Restaurant" /></div>
      </div>
      <div class="g2">
        <div class="fr"><label>Monthly Revenue Est.</label>
          <select id="f-rev">
            <option value="">Select...</option>
            <option>$10K – $50K/mo</option>
            <option>$50K – $100K/mo</option>
            <option>$100K+/mo</option>
          </select>
        </div>
        <div class="fr"><label>Lead Score</label>
          <select id="f-score">
            <option value="A1">A1 — Hot</option>
            <option value="A2">A2 — Warm</option>
            <option value="B1">B1 — Follow Up</option>
            <option value="B2">B2 — Cold</option>
          </select>
        </div>
      </div>
      <div class="g2">
        <div class="fr"><label>Source</label>
          <select id="f-source">
            <option>Instagram</option><option>Facebook</option><option>Google</option>
            <option>Yelp</option><option>Referral</option><option>Cold Outreach</option><option>Other</option>
          </select>
        </div>
        <div class="fr"><label>Follow Up Date</label><input id="f-followup" type="date" /></div>
      </div>
      <div class="fr"><label>Notes</label><textarea id="f-notes" placeholder="Anything relevant about this lead..."></textarea></div>
      <div style="display:flex;gap:9px">
        <button type="submit" class="btn btn-gold">Save Lead</button>
        <button type="button" class="btn btn-outline" onclick="document.getElementById('lead-form').reset()">Clear</button>
      </div>
    </form>
  </div>
</section>

<!-- ── PIPELINE ────────────────────────────────────────── -->
<section id="pipeline" class="section">
  <div class="section-hdr">
    <h1>Lead <span>Pipeline</span></h1>
    <span id="pipe-count" style="font-size:0.75rem;color:var(--muted)"></span>
  </div>
  <div class="pipeline-wrap" id="pipeline-board"></div>
</section>

<!-- ── ALL LEADS ───────────────────────────────────────── -->
<section id="all-leads" class="section">
  <div class="section-hdr">
    <h1>All <span>Leads</span></h1>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-outline btn-sm" onclick="exportCSV()" title="Export all leads to CSV">↓ Export CSV</button>
      <input id="al-search" placeholder="Search..." oninput="renderAllLeads()"
        style="background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:6px 11px;font-size:0.78rem;outline:none;width:180px" />
      <select id="al-score" onchange="renderAllLeads()"
        style="background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:6px 11px;font-size:0.78rem;outline:none">
        <option value="">All Scores</option>
        <option value="A1">A1 Hot</option><option value="A2">A2 Warm</option>
        <option value="B1">B1 Follow Up</option><option value="B2">B2 Cold</option>
      </select>
      <select id="al-status" onchange="renderAllLeads()"
        style="background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:6px 11px;font-size:0.78rem;outline:none">
        <option value="">All Stages</option>
        <option value="new-lead">New Lead</option><option value="contacted">Contacted</option>
        <option value="responded">Responded</option><option value="call-booked">Call Booked</option>
        <option value="submitted">Submitted</option><option value="closed">Closed</option>
        <option value="dead">Dead</option>
      </select>
    </div>
  </div>
  <div class="card" style="overflow-x:auto;padding:0">
    <table class="tbl">
      <thead>
        <tr>
          <th>Business</th><th>Owner</th><th>Score</th><th>Stage</th>
          <th>Revenue</th><th>Source</th><th>Follow Up</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="al-tbody"></tbody>
    </table>
  </div>
</section>

<!-- ── MODAL ────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="modal-title">Lead</h2>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-tabs">
      <button class="mtab active" onclick="mTab('details')">Details</button>
      <button class="mtab"        onclick="mTab('outreach')">Outreach Log</button>
      <button class="mtab"        onclick="mTab('edit')">Edit</button>
    </div>
    <div id="mt-details"  class="mtab-panel active"></div>
    <div id="mt-outreach" class="mtab-panel"></div>
    <div id="mt-edit"     class="mtab-panel"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────
let leads = JSON.parse(localStorage.getItem('tl_leads') || '[]');
const save = () => localStorage.setItem('tl_leads', JSON.stringify(leads));
const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const tod  = () => new Date().toISOString().slice(0,10);
const fmtD = d  => d ? new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
const past = d  => !!d && d < tod();
// Full HTML escape — prevents XSS in all innerHTML injection points
const esc  = s  => String(s||'')
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;')
  .replace(/'/g,'&#x27;');

// Safe href: only allows http/https — blocks javascript: and data: URIs
function safeHref(url) {
  const s = String(url||'').trim();
  if (!s) return null;
  if (/^https?:\/\//i.test(s)) return esc(s);
  if (/^(javascript|data|vbscript):/i.test(s)) return null;
  return 'https://' + esc(s);
}

const COLS = [
  {id:'new-lead',   label:'New Lead',    color:'#818cf8'},
  {id:'contacted',  label:'Contacted',   color:'#fbbf24'},
  {id:'responded',  label:'Responded',   color:'#34d399'},
  {id:'call-booked',label:'Call Booked', color:'#60a5fa'},
  {id:'submitted',  label:'Submitted',   color:'#c084fc'},
  {id:'closed',     label:'Closed',      color:'#22c55e'},
  {id:'dead',       label:'Dead',        color:'#f87171'},
];
const SCORE_LBL = {A1:'Hot',A2:'Warm',B1:'Follow Up',B2:'Cold'};
const ST_LBL    = {'new-lead':'New Lead','contacted':'Contacted','responded':'Responded','call-booked':'Call Booked','submitted':'Submitted','closed':'Closed','dead':'Dead'};

// ── NAV ───────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    if (b.getAttribute('onclick')?.includes("'"+id+"'")) b.classList.add('active');
  });
  if (id==='dashboard') renderDash();
  if (id==='pipeline')  renderPipeline();
  if (id==='all-leads') renderAllLeads();
}

// ── TOAST ─────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.display='none', 2800);
}

// ── SEARCH ────────────────────────────────────────────────
function quickSearch(type) {
  document.getElementById('s-type').value = type;
  doSearch('maps');
}
function doSearch(engine) {
  const type = document.getElementById('s-type').value.trim();
  const loc  = document.getElementById('s-loc').value.trim();
  const kw   = document.getElementById('s-kw').value.trim();
  const q    = [type,kw,loc].filter(Boolean).join(' ');
  if (!q) { toast('Enter a business type or keyword first'); return; }
  const e = encodeURIComponent, el = e(loc||'United States');
  const urls = {
    maps: `https://www.google.com/maps/search/${e(q)}`,
    yelp: `https://www.yelp.com/search?find_desc=${e(q)}&find_loc=${el}`,
    fb:   `https://www.facebook.com/search/pages/?q=${e(q)}`,
    ig:   `https://www.instagram.com/explore/tags/${e(q.replace(/\s+/g,'').toLowerCase())}/`,
    li:   `https://www.linkedin.com/search/results/companies/?keywords=${e(q)}`,
  };
  window.open(urls[engine], '_blank');
}

// ── ADD LEAD ──────────────────────────────────────────────
function submitLead(e) {
  e.preventDefault();
  const lead = {
    id:           uid(),
    businessName: document.getElementById('f-biz').value.trim(),
    ownerName:    document.getElementById('f-owner').value.trim(),
    phone:        document.getElementById('f-phone').value.trim(),
    email:        document.getElementById('f-email').value.trim(),
    website:      document.getElementById('f-web').value.trim(),
    businessType: document.getElementById('f-type').value.trim(),
    revenue:      document.getElementById('f-rev').value,
    score:        document.getElementById('f-score').value,
    source:       document.getElementById('f-source').value,
    followUpDate: document.getElementById('f-followup').value,
    notes:        document.getElementById('f-notes').value.trim(),
    status:       'new-lead',
    createdAt:    tod(),
    lastContact:  '',
    outreach:     []
  };
  leads.unshift(lead);
  save();
  document.getElementById('lead-form').reset();
  toast('✓ Lead saved: ' + lead.businessName);
  show('pipeline');
}

// ── PIPELINE ──────────────────────────────────────────────
let dragId = null;

function renderPipeline() {
  const board = document.getElementById('pipeline-board');
  board.innerHTML = '';
  const n = leads.length;
  document.getElementById('pipe-count').textContent = n + ' lead' + (n!==1?'s':'');

  COLS.forEach(col => {
    const cl = leads.filter(l => l.status === col.id);
    const div = document.createElement('div');
    div.className = 'pipe-col';
    div.innerHTML = `
      <div class="pipe-col-hdr">
        <span class="cn" style="color:${col.color}">${col.label}</span>
        <span class="cc">${cl.length}</span>
      </div>
      <div class="pipe-col-body" data-col="${col.id}"
           ondragover="dOver(event)" ondrop="dDrop(event,this)" ondragleave="dLeave(event)">
        ${cl.map(cardHTML).join('')}
      </div>`;
    board.appendChild(div);
  });
}

function cardHTML(l) {
  const od = l.followUpDate && past(l.followUpDate);
  const display = l.ownerName || l.businessName;
  const sub     = l.ownerName ? l.businessName : (l.businessType||'');
  return `<div class="lead-card${od?' overdue':''}"
    draggable="true" data-id="${l.id}"
    ondragstart="dStart(event,'${l.id}')" ondragend="dEnd(event)"
    onclick="openModal('${l.id}')">
    <div class="lc-name">${esc(display)}</div>
    <div class="lc-biz">${esc(sub)}</div>
    <div class="lc-meta">
      <span class="score score-${l.score}">${l.score}</span>
      <span class="lc-date">${l.followUpDate?(od?'⚠ ':'')+fmtD(l.followUpDate):(l.lastContact?fmtD(l.lastContact):fmtD(l.createdAt))}</span>
    </div>
  </div>`;
}

function dStart(e,id){ dragId=id; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function dEnd(e)     { e.target.classList.remove('dragging'); }
function dOver(e)    { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function dLeave(e)   { e.currentTarget.classList.remove('drag-over'); }
function dDrop(e,el) {
  e.preventDefault(); el.classList.remove('drag-over');
  const col = el.dataset.col;
  const l   = leads.find(x => x.id === dragId);
  if (l && l.status !== col) { l.status=col; l.lastContact=tod(); save(); renderPipeline(); }
  dragId = null;
}

// ── MODAL ─────────────────────────────────────────────────
let curId = null;

function openModal(id) {
  curId = id;
  const l = leads.find(x => x.id===id);
  if (!l) return;
  document.getElementById('modal-title').textContent = l.businessName;
  document.getElementById('modal-overlay').classList.add('open');
  mTab('details');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  curId = null;
}
function overlayClick(e) { if (e.target===document.getElementById('modal-overlay')) closeModal(); }

function mTab(tab) {
  const tabs = ['details','outreach','edit'];
  document.querySelectorAll('.mtab').forEach((b,i) => b.classList.toggle('active', tabs[i]===tab));
  document.querySelectorAll('.mtab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('mt-'+tab).classList.add('active');
  if (tab==='details')  renderMDetails();
  if (tab==='outreach') renderMOutreach();
  if (tab==='edit')     renderMEdit();
}

// ── DETAILS TAB ───────────────────────────────────────────
function renderMDetails() {
  const l = leads.find(x => x.id===curId); if (!l) return;
  const od = l.followUpDate && past(l.followUpDate);
  document.getElementById('mt-details').innerHTML = `
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:18px">
      <span class="score score-${l.score}">${l.score} — ${SCORE_LBL[l.score]}</span>
      <span class="status-badge s-${l.status}">${ST_LBL[l.status]}</span>
      ${od?'<span style="color:var(--red);font-size:0.72rem;font-weight:700">⚠ Follow-up overdue</span>':''}
    </div>
    <div class="g2" style="gap:14px;margin-bottom:16px">
      ${dr('Business',esc(l.businessName))}
      ${dr('Owner',esc(l.ownerName)||'—')}
      ${dr('Phone',l.phone?`<a href="tel:${esc(l.phone)}" style="color:var(--gold)">${esc(l.phone)}</a>`:'—')}
      ${dr('Email',l.email?`<a href="mailto:${esc(l.email)}" style="color:var(--gold)">${esc(l.email)}</a>`:'—')}
      ${dr('Website',(()=>{const h=safeHref(l.website);return h?`<a href="${h}" target="_blank" rel="noopener noreferrer" style="color:var(--gold)">${esc(l.website)}</a>`:'—';})())}
      ${dr('Business Type',esc(l.businessType)||'—')}
      ${dr('Revenue Est.',esc(l.revenue)||'—')}
      ${dr('Source',esc(l.source)||'—')}
      ${dr('Follow Up',l.followUpDate?(od?'<span style="color:var(--red)">⚠ '+fmtD(l.followUpDate)+'</span>':fmtD(l.followUpDate)):'—')}
      ${dr('Added',fmtD(l.createdAt))}
    </div>
    ${l.notes?`<div style="background:var(--navy);border-radius:8px;padding:11px 13px;font-size:0.8rem;color:var(--muted);line-height:1.6;margin-bottom:16px"><strong style="color:var(--text);display:block;margin-bottom:3px;font-size:0.67rem;text-transform:uppercase;letter-spacing:.8px">Notes</strong>${esc(l.notes)}</div>`:''}
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select onchange="changeStatus('${l.id}',this.value)" style="background:var(--navy);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:6px 11px;font-size:0.77rem;outline:none">
        ${COLS.map(c=>`<option value="${c.id}"${l.status===c.id?' selected':''}>${c.label}</option>`).join('')}
      </select>
      <button class="btn btn-outline btn-sm" onclick="mTab('outreach')">Log Outreach</button>
      <button class="btn btn-outline btn-sm" onclick="mTab('edit')">Edit</button>
      <button class="btn btn-danger btn-sm"  onclick="deleteLead('${l.id}')">Delete</button>
    </div>`;
}

function dr(label, val) {
  return `<div class="detail-row"><div class="dl">${label}</div><div class="dv">${val}</div></div>`;
}

function changeStatus(id, status) {
  const l = leads.find(x => x.id===id);
  if (l) { l.status=status; l.lastContact=tod(); save(); renderPipeline(); renderMDetails(); toast('Status updated'); }
}

function deleteLead(id) {
  if (!confirm('Delete this lead? This cannot be undone.')) return;
  leads = leads.filter(x => x.id!==id);
  save(); closeModal(); renderPipeline(); renderAllLeads(); renderDash();
  toast('Lead deleted');
}

// ── OUTREACH TAB ──────────────────────────────────────────
function renderMOutreach() {
  const l = leads.find(x => x.id===curId); if (!l) return;
  const entries = [...(l.outreach||[])].reverse();
  document.getElementById('mt-outreach').innerHTML = `
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Log New Outreach</div>
      <div class="g2" style="margin-bottom:12px">
        <div class="fr" style="margin-bottom:0"><label>Date</label><input type="date" id="oa-date" value="${tod()}" /></div>
        <div class="fr" style="margin-bottom:0"><label>Channel</label>
          <select id="oa-ch"><option>DM</option><option>Email</option><option>Call</option><option>Text</option><option>LinkedIn</option><option>Other</option></select>
        </div>
      </div>
      <div class="fr"><label>Message Sent</label><textarea id="oa-msg" placeholder="What did you send or say?"></textarea></div>
      <div class="fr"><label>Response Received</label><textarea id="oa-resp" placeholder="Any response? Leave blank if none."></textarea></div>
      <button class="btn btn-gold btn-sm" onclick="logOutreach()">Save Entry</button>
    </div>
    <div class="card-title">History (${entries.length} entr${entries.length===1?'y':'ies'})</div>
    ${entries.length===0
      ? '<p style="font-size:0.77rem;color:var(--muted)">No outreach logged yet.</p>'
      : entries.map(o=>`<div class="oe">
          <div class="oe-hdr"><span class="oe-ch">${esc(o.channel)}</span><span class="oe-dt">${fmtD(o.date)}</span></div>
          <div class="oe-msg">${esc(o.message)||'—'}</div>
          ${o.response?`<div class="oe-resp">↩ ${esc(o.response)}</div>`:''}
        </div>`).join('')}`;
}

function logOutreach() {
  const l = leads.find(x => x.id===curId); if (!l) return;
  const msg = document.getElementById('oa-msg').value.trim();
  if (!msg) { toast('Enter a message to log'); return; }
  (l.outreach = l.outreach||[]).push({
    id: uid(),
    date:     document.getElementById('oa-date').value,
    channel:  document.getElementById('oa-ch').value,
    message:  msg,
    response: document.getElementById('oa-resp').value.trim()
  });
  l.lastContact = document.getElementById('oa-date').value;
  save(); renderMOutreach(); toast('Outreach logged');
}

// ── EDIT TAB ──────────────────────────────────────────────
function renderMEdit() {
  const l = leads.find(x => x.id===curId); if (!l) return;
  const opt = (arr, cur) => arr.map(v => `<option${cur===v?' selected':''}>${esc(v)}</option>`).join('');
  document.getElementById('mt-edit').innerHTML = `
    <div class="g2">
      <div class="fr"><label>Business Name</label><input id="e-biz"   value="${esc(l.businessName)}" /></div>
      <div class="fr"><label>Owner Name</label>   <input id="e-owner" value="${esc(l.ownerName)}" /></div>
    </div>
    <div class="g2">
      <div class="fr"><label>Phone</label><input id="e-phone" value="${esc(l.phone)}" /></div>
      <div class="fr"><label>Email</label><input id="e-email" value="${esc(l.email)}" /></div>
    </div>
    <div class="g2">
      <div class="fr"><label>Website</label>       <input id="e-web"  value="${esc(l.website)}" /></div>
      <div class="fr"><label>Business Type</label> <input id="e-type" value="${esc(l.businessType)}" /></div>
    </div>
    <div class="g2">
      <div class="fr"><label>Revenue Est.</label>
        <select id="e-rev">${opt(['','$10K – $50K/mo','$50K – $100K/mo','$100K+/mo'],l.revenue)}</select>
      </div>
      <div class="fr"><label>Lead Score</label>
        <select id="e-score">
          ${[['A1','Hot'],['A2','Warm'],['B1','Follow Up'],['B2','Cold']].map(([v,t])=>`<option value="${v}"${l.score===v?' selected':''}>${v} — ${t}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="g2">
      <div class="fr"><label>Source</label>
        <select id="e-source">${opt(['Instagram','Facebook','Google','Yelp','Referral','Cold Outreach','Other'],l.source)}</select>
      </div>
      <div class="fr"><label>Follow Up Date</label><input type="date" id="e-fu" value="${l.followUpDate||''}" /></div>
    </div>
    <div class="fr"><label>Notes</label><textarea id="e-notes">${esc(l.notes)}</textarea></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-gold" onclick="saveEdit('${l.id}')">Save Changes</button>
      <button class="btn btn-outline" onclick="mTab('details')">Cancel</button>
    </div>`;
}

function saveEdit(id) {
  const l = leads.find(x => x.id===id); if (!l) return;
  l.businessName = document.getElementById('e-biz').value.trim();
  l.ownerName    = document.getElementById('e-owner').value.trim();
  l.phone        = document.getElementById('e-phone').value.trim();
  l.email        = document.getElementById('e-email').value.trim();
  l.website      = document.getElementById('e-web').value.trim();
  l.businessType = document.getElementById('e-type').value.trim();
  l.revenue      = document.getElementById('e-rev').value;
  l.score        = document.getElementById('e-score').value;
  l.source       = document.getElementById('e-source').value;
  l.followUpDate = document.getElementById('e-fu').value;
  l.notes        = document.getElementById('e-notes').value.trim();
  save();
  document.getElementById('modal-title').textContent = l.businessName;
  mTab('details'); renderPipeline(); renderAllLeads(); toast('Lead updated');
}

// ── ALL LEADS ─────────────────────────────────────────────
function renderAllLeads() {
  const q  = (document.getElementById('al-search')?.value||'').toLowerCase();
  const sc = document.getElementById('al-score')?.value||'';
  const st = document.getElementById('al-status')?.value||'';
  const filtered = leads.filter(l => {
    const txt = [l.businessName,l.ownerName,l.businessType,l.phone,l.email,l.source].join(' ').toLowerCase();
    return (!q||txt.includes(q)) && (!sc||l.score===sc) && (!st||l.status===st);
  });
  const tbody = document.getElementById('al-tbody'); if (!tbody) return;
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:32px">No leads found.</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(l => {
    const od = l.followUpDate && past(l.followUpDate);
    return `<tr onclick="openModal('${l.id}')">
      <td><strong>${esc(l.businessName)}</strong>${l.businessType?`<br><span style="font-size:0.68rem;color:var(--muted)">${esc(l.businessType)}</span>`:''}</td>
      <td>${esc(l.ownerName)||'—'}</td>
      <td><span class="score score-${l.score}">${l.score}</span></td>
      <td><span class="status-badge s-${l.status}">${ST_LBL[l.status]}</span></td>
      <td>${esc(l.revenue)||'—'}</td>
      <td>${esc(l.source)||'—'}</td>
      <td style="${od?'color:var(--red);font-weight:700':''}">${l.followUpDate?(od?'⚠ ':'')+fmtD(l.followUpDate):'—'}</td>
      <td><button class="btn btn-outline btn-xs" onclick="event.stopPropagation();openModal('${l.id}')">View</button></td>
    </tr>`;
  }).join('');
}

// ── DASHBOARD ─────────────────────────────────────────────
function renderDash() {
  document.getElementById('dash-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const total   = leads.length;
  const a1      = leads.filter(l => l.score==='A1').length;
  const closed  = leads.filter(l => l.status==='closed').length;
  const odLeads = leads.filter(l => l.followUpDate && past(l.followUpDate) && l.status!=='closed' && l.status!=='dead');
  const rate    = total ? Math.round(closed/total*100) : 0;

  document.getElementById('dash-stats').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">Total Leads</div></div>
    <div class="stat-card"><div class="num">${a1}</div><div class="lbl">A1 Hot Leads</div></div>
    <div class="stat-card${odLeads.length?' danger':''}"><div class="num">${odLeads.length}</div><div class="lbl">Overdue Follow-Ups</div></div>
    <div class="stat-card"><div class="num">${rate}%</div><div class="lbl">Close Rate</div></div>`;

  document.getElementById('overdue-banner').innerHTML = odLeads.length
    ? `<span>⚠ <strong>${odLeads.length} lead${odLeads.length>1?'s':''}</strong> overdue for follow-up: ${odLeads.slice(0,3).map(l=>l.businessName).join(', ')}${odLeads.length>3?` +${odLeads.length-3} more`:''}</span>
       <button class="btn btn-outline btn-sm" onclick="show('pipeline')">View Pipeline</button>`
    : '';

  document.getElementById('dash-pipeline').innerHTML = COLS.map(c => {
    const n   = leads.filter(l => l.status===c.id).length;
    const pct = total ? Math.round(n/total*100) : 0;
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px">
      <span style="font-size:0.67rem;color:${c.color};width:88px;font-weight:700;flex-shrink:0">${c.label}</span>
      <div style="flex:1;background:rgba(255,255,255,.05);border-radius:4px;height:6px">
        <div style="width:${pct}%;background:${c.color};height:6px;border-radius:4px;transition:width .5s"></div>
      </div>
      <span style="font-size:0.68rem;color:var(--muted);width:18px;text-align:right;flex-shrink:0">${n}</span>
    </div>`;
  }).join('');

  const hot = leads.filter(l => l.score==='A1' && l.status!=='closed' && l.status!=='dead').slice(0,6);
  document.getElementById('dash-hot').innerHTML = hot.length
    ? hot.map(l => `<div onclick="openModal('${l.id}')" style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer">
        <div>
          <div style="font-size:0.8rem;font-weight:700">${esc(l.businessName)}</div>
          <div style="font-size:0.67rem;color:var(--muted)">${esc(l.ownerName||l.businessType||'—')} · ${esc(l.source||'—')}</div>
        </div>
        <span class="status-badge s-${l.status}">${ST_LBL[l.status]}</span>
      </div>`).join('')
    : '<p style="font-size:0.77rem;color:var(--muted)">No active A1 leads.</p>';
}

// ── CSV EXPORT ────────────────────────────────────────────
function exportCSV() {
  if (!leads.length) { toast('No leads to export'); return; }
  const HEADERS = ['Business Name','Owner','Phone','Email','Website','Type','Revenue','Score','Stage','Source','Follow Up','Last Contact','Notes','Added'];
  const rows = leads.map(l => [
    l.businessName, l.ownerName, l.phone, l.email, l.website,
    l.businessType, l.revenue, l.score, ST_LBL[l.status]||l.status,
    l.source, l.followUpDate, l.lastContact, l.notes, l.createdAt
  ].map(v => '"' + String(v||'').replace(/"/g,'""') + '"'));
  const csv  = [HEADERS.map(h=>'"'+h+'"').join(','), ...rows.map(r=>r.join(','))].join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), {href:url, download:'trustline-leads-'+tod()+'.csv'});
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Exported ' + leads.length + ' leads to CSV');
}

// ── KEYBOARD SHORTCUTS ────────────────────────────────────
document.addEventListener('keydown', e => {
  // Escape: close modal
  if (e.key === 'Escape') {
    if (document.getElementById('modal-overlay').classList.contains('open')) closeModal();
  }
  // Ignore shortcuts when typing in a field
  if (e.target.matches('input,textarea,select')) return;
  // n → new lead
  if (e.key === 'n' || e.key === 'N') show('add-lead');
  // p → pipeline
  if (e.key === 'p' || e.key === 'P') show('pipeline');
  // d → dashboard
  if (e.key === 'd' || e.key === 'D') show('dashboard');
  // a → all leads
  if (e.key === 'a' || e.key === 'A') show('all-leads');
});

// ── INIT ──────────────────────────────────────────────────
renderDash();
</script>
